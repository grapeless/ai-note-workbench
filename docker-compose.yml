services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: note-workbench-postgres
    environment:
      POSTGRES_DB: note_workbench
      POSTGRES_USER: note_workbench_user
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:8
    container_name: note-workbench-redis
    command:
      - redis-server
      - --requirepass
      - "${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}"
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
